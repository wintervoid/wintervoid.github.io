    <link rel="stylesheet" href="style.css"> <!-- Link to the external CSS file -->
    <style>
        body {
            font-family: 'JetBrains Mono';
            font-size: 22px;
            display: flex;
            margin: 0;
        }
        .sidebar {
            width: 200px;
            background-color: #1e1e2e;
            color: #cdd6f4;
            padding: 15px;
            height: 100vh; /* Full height */
        }
        .sidebar h2 {

        .sidebar ul li {
            margin: 15px 0;
        }
        .sidebar ul li a {
            color: white;
            text-decoration: none;
        }
        .sidebar ul li a:hover {
            text-decoration: underline;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
        .projects {
            display: inline-block; /* Make the background fit only the content */
            font-size: 15px; /* Ensure to include 'px' */
            margin-top: 5px; /* Include 'px' for consistency */
            margin-bottom: 5px; /* Include 'px' for consistency */
            background-color: #2a273f; /* Catppuccin Mocha Surface */
            color: #f5e0dc; /* Catppuccin Mocha Text */
            padding: 10px; /* Add padding for spacing inside the box */
            border-radius: 5px; /* Rounded corners */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        }

        .projects h2 {
            color: #cba6f7; /* Catppuccin Mocha Lavender */
        }

        .projects a {
            color: #74c7ec; /* Catppuccin Mocha Sky */
            text-decoration: none; /* Remove underline */
        }

        .projects a:hover {
            text-decoration: underline; /* Underline on hover */
        }
    </style>
</head>
